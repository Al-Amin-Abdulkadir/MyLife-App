<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="login to MyLife"/>
    <link rel="stylesheet" href="/static/css/auth/login.css">
    <title>MyLife — Sign In</title>
 </head>

<body>

  <div class="container">
    <div class="left">
      <div class="brand-logo">
        <img src="" class="logo">
      </div>
      <img src="images/top-flower.png" class="flower top" />
      <h1 class="title">Login</h1>
      <p class="subtitle">Enter your email and password to login</p>
      {% if error %}
      <div class="error-box">
        <span>&#9888</span> {{error}}
      </div>
      {% endif %}

      <p class="register_text">
        Don't have an account? <a href="/auth/signup">Sign up here</a>
      </p>
      
        <form action="/auth/login" method="post">     
            <div class="field">
                 <input type="text", name="email_or_username", placeholder="Email or Username" required>
            </div>

            <div class="field">
                 <input type="password" name="password" placeholder="Password" required>
            </div>
        
            <button type="submit" class="submit-btn">login</button>
        </form>
    </div>

    <div class="right">
        <div class="hero-banner">
            <img src="/static/images/Login:signuppagephoto.jpg" class="illustrated-image">
        </div>
    </div>

  </div>

</body>
</html>
