<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>if(localStorage.getItem('mylife-theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');}</script>
    <link rel="stylesheet" href="/static/css/auth/session_expired.css">
    <title>MyLife — Session Expired</title>
</head>
<body>

<div class="page">

    <div class="card">
        <div class="brand">
            <span class="brand-mark">🌿</span>
            <span class="brand-name">MyLife</span>
        </div>

        <div class="icon">🔒</div>

        <h1 class="title">Session Expired</h1>
        <p class="subtitle">Your session has timed out or you are not signed in.<br>Please log in again to continue.</p>

        <div class="actions">
            <a href="/auth/login" class="btn-primary">Sign In</a>
            <a href="/" class="btn-ghost">← Back to Home</a>
        </div>

        <div class="theme-row">
            <span class="theme-label">Dark Mode</span>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
            </button>
        </div>
    </div>

</div>

<script>
(function () {
    const toggle = document.getElementById('themeToggle');

    function applyTheme(theme) {
        if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else {
            document.documentElement.removeAttribute('data-theme');
        }
        localStorage.setItem('mylife-theme', theme);
        toggle.classList.toggle('active', theme === 'dark');
    }

    const saved = localStorage.getItem('mylife-theme') || 'light';
    applyTheme(saved);

    toggle.addEventListener('click', function () {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        applyTheme(isDark ? 'light' : 'dark');
    });
}());
</script>
</body>
</html>
